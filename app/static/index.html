<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Evony UI (basic)</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <div class="wrap">
    <h1>Evony UI (basic)</h1>

    <section class="card">
      <h2>Login</h2>

      <div class="row">
        <label>Base URL</label>
        <input id="baseUrl" placeholder="(auto) e.g. http://192.168.1.167:8000" />
      </div>
      <div class="hint">
        Tip: If you opened this UI from another machine, <code>127.0.0.1</code> points to <i>that</i> machine.
        Leave Base URL blank to auto-use the server you loaded <code>/ui/</code> from.
      </div>

      <div class="row">
        <label>Username</label>
        <input id="username" value="alicia" />
      </div>
      <div class="row">
        <label>Password</label>
        <input id="password" type="password" value="ChangeMe123!" />
      </div>

      <div class="row">
        <button id="loginBtn">Login</button>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>

      <div id="apiStatus" class="status small"></div>
      <div id="loginStatus" class="status"></div>
    </section>

    <section class="card">
      <h2>City</h2>
      <div class="row">
        <label>City ID</label>
        <input id="cityId" value="3" />
      </div>
      <div class="row">
        <button id="refreshBtn">Refresh</button>
        <button id="toggleAutoBtn" class="secondary">Auto-refresh: off</button>
      </div>
      <div id="cityStatus" class="status"></div>

      <div class="grid">
        <div>
          <h3>Resources</h3>
          <pre id="resourcesBox">{}</pre>
        </div>
        <div>
          <h3>Troops</h3>
          <pre id="troopsBox">[]</pre>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Training Queue</h2>

      <div class="row">
        <div id="slotsLine" class="pill">Slots: ? / ?</div>
        <div id="barracksLine" class="pill">Barracks: ?</div>
      </div>

      <h3>Enqueue</h3>
      <div class="row">
        <label>Code</label>
        <input id="trainCode" value="t1_inf" />
      </div>
      <div class="row">
        <label>Count</label>
        <input id="trainCount" value="5" />
      </div>
      <button id="enqueueBtn">Enqueue</button>
      <div id="enqueueStatus" class="status"></div>

      <h3>Queue Items</h3>
      <div id="queueList"></div>
      <button id="loadMoreBtn" class="secondary">Load More</button>
    </section>

  </div>

  <script src="/ui/app.js"></script>
</body>
</html>
